version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: 60
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

    # ✅ Use Postgres (NOT SQLite)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow

    # ✅ Install required Python packages
    _PIP_ADDITIONAL_REQUIREMENTS: "google-cloud-storage requests pandas"

    # ✅ GCP credentials path inside container
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/creds/application_default_credentials.json

  volumes:
    # DAGs + logs + plugins
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins

    # ✅ Mount ONLY credentials file (clean + secure)
    - ~/.config/gcloud/application_default_credentials.json:/opt/airflow/creds/application_default_credentials.json

  depends_on:
    - postgres


services:
  # -------------------------
  # Postgres DB (Persistent)
  # -------------------------
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data


  # -------------------------
  # Airflow Webserver
  # -------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver-1
    command: webserver
    ports:
      - "8080:8080"
    restart: always


  # -------------------------
  # Airflow Scheduler
  # -------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler-1
    command: scheduler
    restart: always

  
  # -------------------------
  # Spark Cluster
  # -------------------------
  spark:
    image: apache/spark:3.5.1
    container_name: spark
    volumes:
      - ./:/app
    working_dir: /app
    command: tail -f /dev/null



# -------------------------
# Persistent Volumes
# -------------------------
volumes:
  postgres-db-volume: