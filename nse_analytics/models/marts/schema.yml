version: 2

models:
  - name: stg_nse
    description: "Cleaned and casted NSE equity data from the landing zone."
    columns:
      - name: nse_id
        description: "Primary key: composite hash of symbol and trade_date."
        tests:
          - unique
          - not_null
      - name: series
        tests:
          - accepted_values:
              values: ['EQ']
      - name: close_price
        tests:
          - not_null

  - name: sector_performance
    description: "Daily aggregated performance metrics grouped by sector."
    columns:
      - name: sector
        tests:
          - not_null

  - name: stock_trends
    description: "Time-series model including 7-day and 30-day moving averages."
    columns:
      - name: daily_pct_change
        description: "Percentage change from the previous day's close."